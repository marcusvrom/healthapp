server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based content
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Runtime env config — never cache so API_URL changes take effect immediately
    location = /env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # PWA manifest — short cache to pick up updates
    location = /manifest.webmanifest {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # Service-worker files — must never be cached by the browser
    location ~* (ngsw\.json|ngsw-worker\.js|safety-worker\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Hashed static assets (Angular appends content hash) — immutable long cache
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every route serves index.html so Angular Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
