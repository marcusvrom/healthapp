<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>AiraFit</title>
  <!-- Runtime config generated by entrypoint.sh from API_URL env var -->
  <script src="/env.js"></script>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- Theme color — adapts to system color scheme -->
  <meta name="theme-color" content="#10b981" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d2329" media="(prefers-color-scheme: dark)">

  <!-- PWA / Add to Home Screen (Android + iOS) -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AiraFit">
  <meta name="application-name" content="AiraFit">
  <meta name="description" content="AiraFit — Saúde, nutrição e bem-estar personalizados">

  <!-- App icons -->
  <link rel="icon" type="image/png" href="assets/brand/airafit-logo-2000.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="assets/icons/icon-144x144.png">
  <link rel="apple-touch-icon" sizes="128x128" href="assets/icons/icon-128x128.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Sen:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <app-root></app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
