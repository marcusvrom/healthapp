version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: airafit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-airafit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-airafit_secret}
      POSTGRES_DB: ${DB_NAME:-airafit_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airafit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-airafit} -d ${DB_NAME:-airafit_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airafit_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-airafit}
      DB_PASSWORD: ${DB_PASSWORD:-airafit_secret}
      DB_NAME: ${DB_NAME:-airafit_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads   # named volume keeps uploads across deploys
    networks:
      - airafit_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airafit_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Browser-facing URL — must be reachable from the user's device.
      # Override with the server's public IP/domain when deploying remotely.
      API_URL: ${API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    networks:
      - airafit_net

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  airafit_net:
    driver: bridge
